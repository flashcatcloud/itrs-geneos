name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/geneos-flashduty
